<!doctype html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        /* --- รวม Animation ทั้งหมด --- */
        --animate-hit: hit 0.15s ease-in-out;
        --animate-shake: shake 0.1s ease-in-out infinite;
        --animate-float-up: floatUp 1s ease-out forwards;
        --animate-explode: explode 0.5s ease-out forwards;
        --animate-heavy-hit: heavyHit 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);

        /* --- จังหวะการเคลื่อนที่ (Keyframes) --- */

        /* 1. แรงกระแทกปกติ (ตอนต่อยธรรมดา) */
        @keyframes hit {
          0%,
          100% {
            transform: scale(1);
          }
          50% {
            transform: scale(1.1) rotate(2deg);
          }
        }

        /* 2. สั่นรัวๆ (ตอนใช้ Ora / Muda) */
        @keyframes shake {
          0%,
          100% {
            transform: translateX(0);
          }
          25% {
            transform: translateX(-4px) rotate(-1deg);
          }
          75% {
            transform: translateX(4px) rotate(1deg);
          }
        }

        /* 3. ตัวเลขดาเมจลอยขึ้น (Floating Text) */
        @keyframes floatUp {
          0% {
            transform: translateY(0);
            opacity: 1;
          }
          100% {
            transform: translateY(-60px);
            opacity: 0;
          }
        }

        /* 4. เอฟเฟกต์ระเบิด (สำหรับท่า HASAGI หรือปิดท้าย Combo) */
        @keyframes explode {
          0% {
            transform: scale(1);
            filter: brightness(1) blur(0px);
            opacity: 1;
          }
          50% {
            transform: scale(1.5);
            filter: brightness(2) blur(2px);
            opacity: 0.8;
          }
          100% {
            transform: scale(2);
            filter: brightness(3) blur(10px);
            opacity: 0;
          }
        }

        /* 5. กระแทกหนัก (ถอยหลังแล้วเด้งกลับ) */
        @keyframes heavyHit {
          0% {
            transform: scale(1) translateX(0);
          }
          30% {
            transform: scale(0.9) translateX(-20px);
          }
          100% {
            transform: scale(1) translateX(0);
          }
        }
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dummy Punch</title>
  </head>
  <body
    class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4"
  >
    <div class="text-center mb-8">
      <h1
        class="text-6xl font-black text-yellow-400 drop-shadow-lg"
        id="number"
      >
        0
      </h1>
      <p class="text-slate-400 uppercase tracking-widest text-sm">
        Total Punches
      </p>
      <div class="mt-2 flex gap-4 justify-center">
        <span class="bg-slate-800 px-3 py-1 rounded-full text-xs"
          >Auto: <span id="autoSpeed">0</span>/s</span
        >
        <span class="bg-slate-800 px-3 py-1 rounded-full text-xs"
          >Stacks: <span id="stacks">0</span>/3</span
        >
      </div>
    </div>

    <div class="relative group">
      <div
        class="absolute inset-0 bg-blue-500 blur-3xl opacity-20 group-active:opacity-40 transition-opacity"
      ></div>

      <button
        onclick="punch(event)"
        class="relative transform active:scale-95 transition-transform cursor-pointer"
      >
        <img
          id="dummyImage"
          class="w-128 h-128 object-contain"
          src="./src/dummy.png"
          alt="Dummy"
        />
      </button>
    </div>
    <div class="mt-12 flex gap-4">
      <button
        onclick="steelTempest(event)"
        id="qButton"
        class="px-6 group relative w-auto h-16 bg-blue-600 rounded-lg border-b-4 border-blue-800 active:border-b-0 active:translate-y-1 transition-all overflow-hidden"
      >
        <span class="relative z-10 font-bold">Steel Tempest</span>
        <div
          id="qCooldown"
          class="absolute bottom-0 left-0 w-full bg-black/60 h-0 transition-all"
        ></div>
      </button>

      <button
        onclick="oraPunch(event)"
        id="oraButton"
        class="px-6 w-auto h-16 bg-gray-600 opacity-50 rounded-lg border-b-4 border-purple-800 active:border-b-0 active:translate-y-1 font-bold"
      >
        ORA / 20
      </button>
      <button
        onclick="mudaPunch(event)"
        id="mudaButton"
        class="px-6 w-auto h-16 bg-gray-600 opacity-50 rounded-lg border-b-4 border-purple-800 active:border-b-0 active:translate-y-1 font-bold"
      >
        Muda / 30
      </button>
    </div>
  </body>
  <script src="script.js"></script>
  <script src="./soundscript.js"></script>
  <script src="./cooldown.js"></script>
</html>
