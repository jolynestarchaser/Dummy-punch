<!doctype html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dummy Punch</title>
  </head>
  <body>
    <div class="content-center text-center">
      <h1 id="number">0</h1>
      <button
        onclick="punch()"
        class="cursor-pointer focus:outline-none active:scale-90 hover:scale-95"
      >
        <img
          id="dummyImage"
          class="w-100 transition-all duration-100"
          src="./src/dummy.png"
          alt="Cookies"
        />
      </button>
      <div>
        <button
          onclick="upgrade()"
          class="cursor-pointer focus:outline-none active:scale-90"
        >
          Ora Ora Ora <small class="text-red-800">(required 20 cookies)</small>
        </button>
        <button
          onclick="upgrade2()"
          class="cursor-pointer focus:outline-none active:scale-90" id="haki"
        >
          Haki <small class="text-red-800">(required 30 cookies)</small>
        </button>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
  <script src="./soundscript.js"></script>
</html>
